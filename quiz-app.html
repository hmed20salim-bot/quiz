<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المراجعة الذكية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #181b24;
    --surface: #232733;
    --surface-2: #2c313f;
    --text: #f1efe9;
    --muted: #9aa0ad;
    --amber: #f0a93b;
    --amber-dim: #4a3a1c;
    --green: #3ecf8e;
    --red: #f1654c;
    --border: #3a3f4d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
  }
  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 28px 20px 60px;
    min-height: 100vh;
  }
  .brand { text-align: center; margin-bottom: 28px; }
  .brand .mark {
    display: inline-block;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--amber), #b5781f 70%);
    margin-bottom: 10px;
  }
  .brand h1 { font-size: 20px; font-weight: 900; margin: 0; }
  .brand p { color: var(--muted); font-size: 13px; margin: 4px 0 0; }
  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px;
  }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .field input {
    width: 100%; padding: 13px 14px;
    border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text);
    font-size: 15px; font-family: inherit;
  }
  .field input:focus { outline: 2px solid var(--amber); outline-offset: 1px; }
  .choice-row { display: flex; gap: 10px; }
  .choice-btn {
    flex: 1; padding: 13px 8px;
    border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text);
    font-family: inherit; font-size: 13.5px; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .choice-btn.selected {
    border-color: var(--amber); background: var(--amber-dim);
    color: var(--amber); font-weight: 700;
  }
  .primary-btn {
    width: 100%; padding: 15px; border: none;
    border-radius: 12px; background: var(--amber); color: #1c1206;
    font-family: inherit; font-size: 16px; font-weight: 900;
    cursor: pointer; margin-top: 6px;
  }
  .primary-btn:active { transform: scale(0.98); }
  .error-msg { color: var(--red); font-size: 13px; margin-top: -6px; margin-bottom: 12px; }
  .quiz-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .quiz-top .progress { font-size: 13px; color: var(--muted); }
  .timer-wrap { position: relative; width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; }
  .timer-glow {
    position: absolute; inset: -10px; border-radius: 50%;
    background: radial-gradient(circle, rgba(240,169,59,0.35), transparent 70%);
    transition: background .3s;
  }
  .timer-wrap.warning .timer-glow { background: radial-gradient(circle, rgba(241,101,76,0.55), transparent 70%); }
  .timer-num { position: relative; font-weight: 900; font-size: 16px; }
  .timer-wrap.warning .timer-num { color: var(--red); }
  .loading-box { text-align: center; color: var(--muted); padding: 50px 0; font-size: 14px; }
  .dot-spin {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--amber); margin: 0 2px; animation: pulse 1s infinite ease-in-out;
  }
  .dot-spin:nth-child(2) { animation-delay: .15s; }
  .dot-spin:nth-child(3) { animation-delay: .3s; }
  @keyframes pulse { 0%,100%{opacity:.3;} 50%{opacity:1;} }
  .q-text { font-size: 17px; line-height: 1.7; margin: 0 0 18px; }
  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .option-btn {
    text-align: right; padding: 14px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface-2);
    color: var(--text); font-family: inherit; font-size: 14.5px; cursor: pointer;
  }
  .option-btn.selected { border-color: var(--amber); }
  .option-btn.correct { border-color: var(--green); background: rgba(62,207,142,0.12); }
  .option-btn.incorrect { border-color: var(--red); background: rgba(241,101,76,0.12); }
  .option-btn:disabled { cursor: default; }
  textarea {
    width: 100%; min-height: 100px; padding: 13px;
    border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text);
    font-family: inherit; font-size: 15px; resize: vertical; margin-bottom: 16px;
  }
  .feedback-card { background: var(--surface-2); border-radius: 12px; padding: 16px; margin-top: 14px; font-size: 14.5px; line-height: 1.7; white-space: pre-line; }
  .feedback-card.correct-fb { border-right: 4px solid var(--green); }
  .feedback-card.incorrect-fb { border-right: 4px solid var(--red); }
  .error-screen { text-align: center; padding: 60px 10px; }
  .error-screen .x { font-size: 38px; margin-bottom: 12px; }
  .level-pill {
    display: inline-block; font-size: 11.5px; padding: 3px 10px;
    border-radius: 20px; background: var(--amber-dim); color: var(--amber); margin-bottom: 10px;
  }
</style>
</head>
<body>
<div class="app">

  <div class="brand">
    <div class="mark"></div>
    <h1>المراجعة الذكية</h1>
    <p>سؤال جديد كل مرة، لحد ما تتقن المادة</p>
  </div>

  <section id="setup-screen" class="screen active">
    <div class="card">
      <div class="field">
        <label for="grade">انت في إيه؟</label>
        <input type="text" id="grade" placeholder="مثلاً: ثالثة اعدادي">
      </div>
      <div class="field">
        <label for="subject">المادة اللي عاوز تتدرب عليها</label>
        <input type="text" id="subject" placeholder="مثلاً: فيزياء">
      </div>
      <div class="field">
        <label>مستواك في المادة؟</label>
        <div class="choice-row" id="level-group">
          <button type="button" class="choice-btn" data-value="beginner">مبتدئ</button>
          <button type="button" class="choice-btn" data-value="intermediate">متوسط</button>
        </div>
      </div>
      <div class="field">
        <label>تحب الأسئلة تكون؟</label>
        <div class="choice-row" id="type-group">
          <button type="button" class="choice-btn" data-value="mcq">اختيارات (٣٠ ثانية)</button>
          <button type="button" class="choice-btn" data-value="written">كتابة (دقيقة)</button>
        </div>
      </div>
      <p id="setup-error" class="error-msg" style="display:none;"></p>
      <button id="start-btn" class="primary-btn">يلا نبدأ</button>
    </div>
  </section>

  <section id="quiz-screen" class="screen">
    <div class="quiz-top">
      <div>
        <span class="level-pill" id="level-pill">مبتدئ</span>
        <div class="progress" id="progress-text">سؤال ١</div>
      </div>
      <div class="timer-wrap" id="timer-wrap">
        <div class="timer-glow"></div>
        <div class="timer-num" id="timer-num">--</div>
      </div>
    </div>

    <div class="card">
      <div id="loading-box" class="loading-box" style="display:none;">
        جاري تجهيز السؤال
        <div style="margin-top:10px;">
          <span class="dot-spin"></span><span class="dot-spin"></span><span class="dot-spin"></span>
        </div>
      </div>

      <div id="question-box" style="display:none;">
        <p class="q-text" id="question-text"></p>
        <div class="options" id="options-container" style="display:none;"></div>
        <div id="written-container" style="display:none;">
          <textarea id="written-answer" placeholder="اكتب إجابتك هنا"></textarea>
        </div>
        <button id="submit-answer-btn" class="primary-btn">تأكيد الإجابة</button>
      </div>

      <div id="feedback-box" style="display:none;">
        <div class="feedback-card" id="feedback-card">
          <p id="feedback-text" style="margin:0;"></p>
        </div>
        <button id="next-question-btn" class="primary-btn" style="margin-top:16px;">السؤال اللي بعده</button>
      </div>
    </div>
  </section>

  <section id="error-screen" class="screen">
    <div class="error-screen">
      <div class="x">⚠️</div>
      <p id="error-text">حصل خطأ في تجهيز السؤال</p>
      <button id="retry-btn" class="primary-btn">حاول تاني</button>
    </div>
  </section>

</div>

<script>
  const QUESTIONS_PER_LEVEL = 5;

  let state = {
    grade: "", subject: "", level: "", type: "",
    questionsAnsweredInLevel: 0,
    currentQuestion: null,
    selectedOptionIndex: null,
    timerInterval: null,
    timeLeft: 0,
    askedQuestions: []
  };

  const setupScreen = document.getElementById("setup-screen");
  const quizScreen = document.getElementById("quiz-screen");
  const errorScreen = document.getElementById("error-screen");

  const gradeInput = document.getElementById("grade");
  const subjectInput = document.getElementById("subject");
  const levelGroup = document.getElementById("level-group");
  const typeGroup = document.getElementById("type-group");
  const setupError = document.getElementById("setup-error");
  const startBtn = document.getElementById("start-btn");

  const levelPill = document.getElementById("level-pill");
  const progressText = document.getElementById("progress-text");
  const timerWrap = document.getElementById("timer-wrap");
  const timerNum = document.getElementById("timer-num");
  const loadingBox = document.getElementById("loading-box");
  const questionBox = document.getElementById("question-box");
  const questionText = document.getElementById("question-text");
  const optionsContainer = document.getElementById("options-container");
  const writtenContainer = document.getElementById("written-container");
  const writtenAnswer = document.getElementById("written-answer");
  const submitAnswerBtn = document.getElementById("submit-answer-btn");
  const feedbackBox = document.getElementById("feedback-box");
  const feedbackCard = document.getElementById("feedback-card");
  const feedbackText = document.getElementById("feedback-text");
  const nextQuestionBtn = document.getElementById("next-question-btn");
  const retryBtn = document.getElementById("retry-btn");

  function setupChoiceGroup(group, key) {
    const buttons = group.querySelectorAll(".choice-btn");
    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        buttons.forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        state[key] = btn.dataset.value;
      });
    });
  }
  setupChoiceGroup(levelGroup, "level");
  setupChoiceGroup(typeGroup, "type");

  function showScreen(name) {
    [setupScreen, quizScreen, errorScreen].forEach(s => s.classList.remove("active"));
    if (name === "setup") setupScreen.classList.add("active");
    if (name === "quiz") quizScreen.classList.add("active");
    if (name === "error") errorScreen.classList.add("active");
  }

  startBtn.addEventListener("click", () => {
    state.grade = gradeInput.value.trim();
    state.subject = subjectInput.value.trim();

    if (!state.grade || !state.subject || !state.level || !state.type) {
      setupError.textContent = "من فضلك اكمل كل البيانات قبل ما تبدأ";
      setupError.style.display = "block";
      return;
    }
    setupError.style.display = "none";
    showScreen("quiz");
    fetchQuestion();
  });

  async function fetchQuestion() {
    clearInterval(state.timerInterval);
    questionBox.style.display = "none";
    feedbackBox.style.display = "none";
    loadingBox.style.display = "block";
    timerNum.textContent = "--";
    timerWrap.classList.remove("warning");

    levelPill.textContent = state.level === "beginner" ? "مبتدئ" : "متوسط";
    progressText.textContent = `سؤال ${state.questionsAnsweredInLevel + 1}`;

    const avoidList = state.askedQuestions.length
      ? `الأسئلة دي سبق سؤالها، تجنبها تمامًا ولا تكرر معناها حتى:
${state.askedQuestions.map((q, i) => `${i + 1}. ${q}`).join("\n")}`
      : "";

    const prompt = `أنت معلم خبير في مادة "${state.subject}" لطلاب مرحلة "${state.grade}".
اكتب سؤال واحد جديد ومختلف تمامًا بمستوى صعوبة "${state.level}".
لا تكرر أسئلة شائعة أو نمطية، اجعل السؤال متنوعًا ومحدد كل مرة.
${avoidList}
${state.type === "mcq"
  ? 'اعطِ 4 اختيارات وحدد رقم الإجابة الصحيحة من 0 إلى 3 في correctIndex.'
  : 'يجب أن يكون السؤال يحتاج إجابة مكتوبة قصيرة، واعطِ الإجابة الصحيحة المتوقعة في answer.'}

رجّع فقط بصيغة JSON صارمة بدون أي نص إضافي أو علامات markdown، بهذا الشكل تمامًا:
{"question": "نص السؤال", "type": "${state.type}", "options": ${state.type === "mcq" ? '["خيار1","خيار2","خيار3","خيار4"]' : "null"}, "correctIndex": ${state.type === "mcq" ? "0" : "null"}, "answer": "الإجابة الصحيحة كنص قصير"}`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 400,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const textBlock = data.content.find(b => b.type === "text");
      const cleaned = textBlock.text.replace(/```json|```/g, "").trim();
      const question = JSON.parse(cleaned);

      state.askedQuestions.push(question.question);
      if (state.askedQuestions.length > 12) state.askedQuestions.shift();

      state.currentQuestion = question;
      renderQuestion(question);
    } catch (err) {
      console.error(err);
      showScreen("error");
    }
  }

  function renderQuestion(data) {
    loadingBox.style.display = "none";
    questionBox.style.display = "block";
    questionText.textContent = data.question;
    state.selectedOptionIndex = null;

    if (data.type === "mcq") {
      writtenContainer.style.display = "none";
      optionsContainer.style.display = "flex";
      optionsContainer.innerHTML = "";
      data.options.forEach((opt, index) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = opt;
        btn.addEventListener("click", () => {
          optionsContainer.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          state.selectedOptionIndex = index;
        });
        optionsContainer.appendChild(btn);
      });
      startTimer(30);
    } else {
      optionsContainer.style.display = "none";
      writtenContainer.style.display = "block";
      writtenAnswer.value = "";
      startTimer(60);
    }
  }

  function startTimer(seconds) {
    state.timeLeft = seconds;
    timerNum.textContent = state.timeLeft;
    state.timerInterval = setInterval(() => {
      state.timeLeft--;
      timerNum.textContent = state.timeLeft;
      if (state.timeLeft <= 10) timerWrap.classList.add("warning");
      if (state.timeLeft <= 0) {
        clearInterval(state.timerInterval);
        handleSubmit(true);
      }
    }, 1000);
  }

  submitAnswerBtn.addEventListener("click", () => handleSubmit(false));

  function handleSubmit(timeUp) {
    clearInterval(state.timerInterval);
    const q = state.currentQuestion;
    questionBox.style.display = "none";
    feedbackBox.style.display = "block";
    feedbackCard.classList.remove("correct-fb", "incorrect-fb");

    if (q.type === "mcq") {
      const buttons = optionsContainer.querySelectorAll(".option-btn");
      buttons.forEach((btn, index) => {
        btn.disabled = true;
        if (index === q.correctIndex) btn.classList.add("correct");
        else if (index === state.selectedOptionIndex) btn.classList.add("incorrect");
      });

      if (timeUp) {
        feedbackCard.classList.add("incorrect-fb");
        feedbackText.textContent = `خلص الوقت! الإجابة الصحيحة: ${q.options[q.correctIndex]}`;
      } else if (state.selectedOptionIndex === q.correctIndex) {
        feedbackCard.classList.add("correct-fb");
        feedbackText.textContent = "إجابة صحيحة! 🎉";
      } else if (state.selectedOptionIndex === null) {
        feedbackCard.classList.add("incorrect-fb");
        feedbackText.textContent = `محتاج تختار إجابة. الإجابة الصحيحة: ${q.options[q.correctIndex]}`;
      } else {
        feedbackCard.classList.add("incorrect-fb");
        feedbackText.textContent = `إجابة غلط. الإجابة الصحيحة: ${q.options[q.correctIndex]}`;
      }
    } else {
      feedbackText.textContent = timeUp
        ? `خلص الوقت! الإجابة المتوقعة: ${q.answer}`
        : `إجابتك: "${writtenAnswer.value || "(من غير إجابة)"}"\nالإجابة المتوقعة: ${q.answer}`;
    }
  }

  nextQuestionBtn.addEventListener("click", () => {
    state.questionsAnsweredInLevel++;
    if (state.level === "beginner" && state.questionsAnsweredInLevel >= QUESTIONS_PER_LEVEL) {
      state.level = "intermediate";
      state.questionsAnsweredInLevel = 0;
    }
    fetchQuestion();
  });

  retryBtn.addEventListener("click", () => {
    showScreen("quiz");
    fetchQuestion();
  });
</script>
</body>
</html>
